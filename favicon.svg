<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded square background using portfolio's primary navy -->
  <rect width="64" height="64" rx="14" fill="#0b2b40"/>
  
  <!-- "SE" monogram in white with the accent colour for the E -->
  <text x="50%" y="50%"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32"
        font-weight="800"
        letter-spacing="-1"
        fill="#ffffff">S<tspan fill="#5fa3c7" font-weight="300">E</tspan></text>
</svg>
